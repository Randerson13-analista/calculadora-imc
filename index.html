<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitLife IMC</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438") no-repeat center center/cover;
    height: 100vh;
}

.overlay {
    background: rgba(0,0,0,0.75);
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.menu {
    background: #111;
    color: white;
    display: flex;
    justify-content: space-around;
    padding: 15px;
}

.menu button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
}

input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
}

button.action {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
}

.hidden { display:none; }

#history {
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
    text-align: left;
}
</style>
</head>

<body>

<div class="overlay">

<!-- MENU -->
<div class="menu">
    <button onclick="show('profile')">Perfil</button>
    <button onclick="show('imc')">IMC</button>
    <button onclick="show('history')">Histórico</button>
    <button onclick="logout()">Sair</button>
</div>

<!-- PERFIL -->
<div class="container" id="profile">
<div class="card">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="email" placeholder="Email">
<button class="action" onclick="enter()">Entrar</button>
</div>
</div>

<!-- IMC -->
<div class="container hidden" id="imc">
<div class="card">
<h2>Calculadora IMC</h2>

<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (m)">

<button class="action" onclick="calc()">Calcular</button>

<div id="result"></div>

<div id="tips"></div>
</div>
</div>

<!-- HISTÓRICO -->
<div class="container hidden" id="history">
<div class="card">
<h2>Histórico</h2>
<div id="list"></div>
</div>
</div>

</div>

<script>

let data = [];

function show(page){
    document.getElementById("profile").classList.add("hidden");
    document.getElementById("imc").classList.add("hidden");
    document.getElementById("history").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function enter(){
    show("imc");
}

function calc(){
    let p = parseFloat(document.getElementById("peso").value);
    let a = parseFloat(document.getElementById("altura").value);

    if(!p || !a){
        alert("Preencha tudo!");
        return;
    }

    let imc = p/(a*a);
    let msg = "";

    if(imc < 18.5) msg = "Abaixo do peso";
    else if(imc < 25) msg = "Peso normal";
    else if(imc < 30) msg = "Sobrepeso";
    else msg = "Obesidade";

    document.getElementById("result").innerHTML =
    `IMC: <b>${imc.toFixed(2)}</b> - ${msg}`;

    let tips = "";

    if(imc < 18.5){
        tips = "🔵 Foco: ganho de massa (proteínas + treino de força)";
    } else if(imc < 25){
        tips = "🟢 Manter rotina equilibrada de treino e alimentação";
    } else {
        tips = "🔴 Foco: déficit calórico + exercícios aeróbicos";
    }

    document.getElementById("tips").innerText = tips;

    data.push(`IMC: ${imc.toFixed(2)} - ${msg}`);
    updateHistory();
}

function updateHistory(){
    document.getElementById("list").innerHTML =
        data.map(d => `<p>${d}</p>`).join("");
}

function logout(){
    location.reload();
}

</script>

</body>
</html>
