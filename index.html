<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora IMC</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            width: 95%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #resultado {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Calculadora IMC</h1>

    <input id="peso" placeholder="Peso (kg)">
    <input id="altura" placeholder="Altura (m)">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</div>

<script>
function calcular() {
    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);

    if (!peso || !altura) {
        document.getElementById("resultado").innerText = "Preencha todos os campos!";
        return;
    }

    let imc = peso / (altura * altura);
    let texto = "";

    if (imc < 18.5) texto = "Abaixo do peso";
    else if (imc < 25) texto = "Peso normal";
    else if (imc < 30) texto = "Sobrepeso";
    else texto = "Obesidade";

    document.getElementById("resultado").innerText =
        `IMC: ${imc.toFixed(2)} - ${texto}`;
}
</script>

</body>
</html>
