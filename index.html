<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitLife IMC Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1d976c, #93f9b9);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1e7e34;
}

.hidden { display:none; }

.menu {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 10px;
}

.menu span {
    cursor: pointer;
    color: #28a745;
    font-weight: bold;
}

#history {
    text-align: left;
    font-size: 12px;
    max-height: 120px;
    overflow: auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="login">
    <h2>Login FitLife</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div class="card hidden" id="app">

<div class="menu">
    <span onclick="show('imc')">IMC</span>
    <span onclick="show('history')">Histórico</span>
    <span onclick="logout()">Sair</span>
</div>

<div id="imc">
    <h3>Calculadora IMC</h3>

    <input id="peso" placeholder="Peso (kg)">
    <input id="altura" placeholder="Altura (m)">

    <button onclick="calc()">Calcular</button>

    <div id="result"></div>
</div>

<div id="history" class="hidden"></div>

</div>

<script>

let history = [];

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(!u || !p){
        alert("Preencha login");
        return;
    }

    localStorage.setItem("user", u);

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
}

function show(page){
    document.getElementById("imc").classList.add("hidden");
    document.getElementById("history").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function calc(){
    let p = parseFloat(document.getElementById("peso").value);
    let a = parseFloat(document.getElementById("altura").value);

    if(!p || !a){
        alert("Preencha tudo!");
        return;
    }

    let imc = p/(a*a);

    let msg = imc < 18.5 ? "Abaixo" :
              imc < 25 ? "Normal" :
              imc < 30 ? "Sobrepeso" : "Obesidade";

    document.getElementById("result").innerHTML =
        `IMC: <b>${imc.toFixed(2)}</b> - ${msg}`;

    history.push(`IMC ${imc.toFixed(2)} - ${msg}`);
    updateHistory();
}

function updateHistory(){
    document.getElementById("history").innerHTML =
        history.map(h => `<p>${h}</p>`).join("");
}

function logout(){
    location.reload();
}

</script>

</body>
</html>
